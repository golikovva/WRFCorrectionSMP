data:
  start_date: '2015-01-15'
  end_date: '2018-12-31'
  wrf_folder: '/home/wrf_smp_data/'
  era_folder: '/home/era_data/'
  gfs_folder: '/home/gfs_data/'
  scatter_folder: '/home/scatter/'
  stations_folder: '/home/stations/borey/interp/'
  wrf_mean_path: "/home/metadata/means_dict"
  wrf_std_path: "/home/metadata/stds_dict"
  base_folder: '/home'
  logs_folder: "/home/logs/"
  wrf_variables: ['uvmet10', 'T2', 'SEAICE', 'HGT']
  era_variables: ['u10', 'v10', 't2m']
  gfs_variables: ['UGRD_10maboveground', 'VGRD_10maboveground', 'TMP_2maboveground']

reference_dataset: GFS
target_dataset: ERA5
reference_region: global

s2s:
  sequence_len: 1

train:
  max_epochs: 40
  scheduler_type: MultiStepLR
  lr: 0.0001

model_type: UNet
model_args:
  BERTunet:
    n_channels: 7
    n_classes: 3
    bilinear: True
    h: 720 #412
    w: 1440 #1050
    chan_factor: 1
  DETrajGRU:
    encoder_cahnnels: 2
  VSBERTunet:
    n_channels: 4
    n_classes: 3
    max_len: 24
    chan_factor: 2
    bilinear: True
  ConvNext:
    n_channels: 9
    n_classes: 3
  UNet:
    n_channels: 7
    n_classes: 3
    bilinear: True
  ViT:
    in_channels: 7
    out_channels: 3
    h_channels: 256
    img_size: [720, 1440]
    patch_size: 20
    depth: 12
    decoder_depth: 4
    num_heads: 16
    mlp_ratio: 4
    drop_path: 0
    drop_rate: 0
    per_var_embedding: True
  SwinLSTM_B:
    img_size: [720, 1440]
    patch_size: 12
    in_chans: 7
    embed_dim: 128
    depths: 6
    num_heads: 16
    window_size: 4
    drop_rate: 0
    attn_drop_rate: 0
    drop_path_rate: 0
  SwinLSTM_D:
    img_size: [720, 1440]
    patch_size: 2
    window_size: 6
    in_chans: 7
    embed_dim: 128
    depths_downsample: [2, 6]
    depths_upsample: [6, 2]
    num_heads: [4, 8]
  TimeSformer:
    img_size: [720, 1440]
    patch_size: 12
    in_chans: 7
    out_chans: 3
    embed_dim: 512
    num_frames: 4
    depth: 12
    decoder_depth: 4
    num_heads: 16
    mlp_ratio: 4
    attention_type: divided_space_time
  CNN2D:
    input_size: [720, 1440]
    n_layers: 5
    in_time_points: 7
    out_time_points: 3
  CNN3D:
    input_size: [720, 1440]
    n_layers: 2
    in_time_points: 7
    out_time_points: 3
    convolve_params: 
      kernel_size: [7, 3, 3]
    transpose_convolve_params:
      kernel_size: [7, 3, 3]
    conv_dim: 3
  RoPEUNet:
    n_channels: 9
    n_classes: 3
    bilinear: True
    max_T: 10
    vit_depth: 4
    vit_heads: 4
    vit_mlp_ratio: 4.0
    vit_drop: 0.0
    vit_attn_drop: 0.0
    vit_drop_path: 0.0
    vit_rope_theta: 10000.0
    vit_rope_mode: "mixed"

location_encoding:
  enabled: false
  type: siren_sh
  legendre_polys: 20
  out_channels: 8
  dim_hidden: 64
  num_layers: 2
  dropout: false
  w0: 1.0
  w0_initial: 30.0

betas:
  beta_era: 1
  beta_ms: 0
  beta_st: 0
  beta_sc: 0

run_config:
  run_mode: 'train'
  num_workers: 8
  batch_size: 1
  use_spatial_encoding: 1
  use_time_encoding: 1
  use_landmask: 0
  weighted_meaner: 0
  variable_sequence_length: 0
  use_stations: False
  use_scatter: False

loss_config:
  loss_kernel: 'gauss'
  k: 9

test_config:
  debug_mode: False
  best_epoch_id: 13
  run_id: 23
  draw_plots: 1
  draw_spectrum: 0
  save_losses: 0
  save_outputs: 0

